<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Graph Viewer</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Fira+Sans:wght@400;600&display=swap"
    />
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
      :root {
        --ink: #102132;
        --muted: #5c6b7a;
        --paper: #f5f1ea;
        --accent: #f28b30;
        --accent-2: #2c8c99;
        --accent-3: #d94b4b;
        --grid: rgba(16, 33, 50, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Fira Sans", system-ui, -apple-system, sans-serif;
        color: var(--ink);
        background: radial-gradient(circle at 10% 10%, #fff7e7, #f5f1ea 40%, #eef4f6 100%);
        min-height: 100vh;
      }

      header {
        padding: 20px 28px 0;
      }

      h1 {
        font-family: "Space Grotesk", system-ui, -apple-system, sans-serif;
        font-size: clamp(22px, 3vw, 32px);
        margin: 0 0 6px;
        letter-spacing: -0.02em;
      }

      .subtitle {
        color: var(--muted);
        margin: 0 0 18px;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 320px;
        gap: 18px;
        padding: 0 24px 24px;
      }

      .panel {
        background: rgba(255, 255, 255, 0.8);
        border: 1px solid rgba(16, 33, 50, 0.08);
        border-radius: 16px;
        box-shadow: 0 18px 40px rgba(16, 33, 50, 0.08);
      }

      #chart {
        position: relative;
        overflow: hidden;
        min-height: 70vh;
      }

      svg {
        width: 100%;
        height: 100%;
      }

      .sidebar {
        padding: 16px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .stat {
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(242, 139, 48, 0.12);
        font-weight: 600;
      }

      .legend {
        display: grid;
        gap: 8px;
      }

      .legend-item {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 14px;
        color: var(--muted);
      }

      .swatch {
        width: 14px;
        height: 14px;
        border-radius: 50%;
      }

      .detail {
        border-top: 1px dashed rgba(16, 33, 50, 0.15);
        padding-top: 12px;
      }

      .detail h2 {
        font-family: "Space Grotesk", system-ui, -apple-system, sans-serif;
        font-size: 18px;
        margin: 0 0 8px;
      }

      .detail p {
        margin: 4px 0;
        color: var(--muted);
        font-size: 14px;
      }

      .hint {
        font-size: 13px;
        color: var(--muted);
        margin: 0;
      }

      .link {
        stroke: rgba(16, 33, 50, 0.18);
        stroke-width: 1.2px;
      }

      .node {
        cursor: pointer;
        stroke: #fff;
        stroke-width: 1.4px;
        transition: transform 0.2s ease;
      }

      .node:hover {
        transform: scale(1.08);
      }

      .node-label {
        font-size: 11px;
        fill: var(--ink);
        pointer-events: none;
      }

      .floating {
        position: absolute;
        top: 14px;
        left: 14px;
        display: inline-flex;
        gap: 10px;
        padding: 8px 12px;
        background: rgba(255, 255, 255, 0.9);
        border-radius: 999px;
        border: 1px solid rgba(16, 33, 50, 0.08);
        font-size: 13px;
      }

      @media (max-width: 900px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .sidebar {
          order: -1;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Photosynthesis Concept Graph</h1>
      <p class="subtitle">Force-directed view of nodes and relations from graph.json</p>
    </header>

    <main class="layout">
      <section id="chart" class="panel">
        <div class="floating" id="status">Loading graph...</div>
        <svg></svg>
      </section>

      <aside class="panel sidebar">
        <div>
          <strong>Graph Stats</strong>
          <div class="stats">
            <div class="stat" id="node-count">Nodes: 0</div>
            <div class="stat" id="link-count">Links: 0</div>
          </div>
        </div>
        <div>
          <strong>Node Types</strong>
          <div class="legend" id="legend"></div>
        </div>
        <div class="detail">
          <h2 id="detail-title">Hover a node</h2>
          <p id="detail-type">Type: --</p>
          <p id="detail-source">Source: --</p>
          <p class="hint">Drag nodes to reposition. Scroll to zoom.</p>
        </div>
      </aside>
    </main>

    <script>
      const svg = d3.select("svg");
      const chart = document.getElementById("chart");
      const status = document.getElementById("status");
      const nodeCount = document.getElementById("node-count");
      const linkCount = document.getElementById("link-count");
      const legend = document.getElementById("legend");
      const detailTitle = document.getElementById("detail-title");
      const detailType = document.getElementById("detail-type");
      const detailSource = document.getElementById("detail-source");

      const width = () => chart.clientWidth;
      const height = () => chart.clientHeight;

      const color = d3.scaleOrdinal().range([
        "#f28b30",
        "#2c8c99",
        "#d94b4b",
        "#6c7d91",
        "#8f5bd4",
        "#3c7d3c"
      ]);

      const zoomLayer = svg.append("g");

      svg.call(
        d3.zoom().scaleExtent([0.4, 3]).on("zoom", (event) => {
          zoomLayer.attr("transform", event.transform);
        })
      );

      function updateDetail(node) {
        if (!node) {
          detailTitle.textContent = "Hover a node";
          detailType.textContent = "Type: --";
          detailSource.textContent = "Source: --";
          return;
        }
        detailTitle.textContent = node.label;
        detailType.textContent = `Type: ${node.type}`;
        detailSource.textContent = `Source: ${node.source_url || "--"}`;
      }

      fetch("graph.json")
        .then((res) => res.json())
        .then((data) => {
          const nodes = data.nodes || [];
          const links = [];
          nodes.forEach((node) => {
            (node.relations || []).forEach((rel) => {
              links.push({
                source: node.id,
                target: rel.to,
                type: rel.type,
              });
            });
          });

          const types = Array.from(new Set(nodes.map((n) => n.type)));
          color.domain(types);

          legend.innerHTML = "";
          types.forEach((type) => {
            const row = document.createElement("div");
            row.className = "legend-item";
            row.innerHTML = `<span class="swatch" style="background:${color(type)}"></span>${type}`;
            legend.appendChild(row);
          });

          nodeCount.textContent = `Nodes: ${nodes.length}`;
          linkCount.textContent = `Links: ${links.length}`;
          status.textContent = "Drag to explore";

          const simulation = d3
            .forceSimulation(nodes)
            .force("link", d3.forceLink(links).id((d) => d.id).distance(90))
            .force("charge", d3.forceManyBody().strength(-180))
            .force("center", d3.forceCenter(width() / 2, height() / 2))
            .force("collision", d3.forceCollide(22));

          const link = zoomLayer
            .append("g")
            .attr("stroke-linecap", "round")
            .selectAll("line")
            .data(links)
            .join("line")
            .attr("class", "link");

          const node = zoomLayer
            .append("g")
            .selectAll("circle")
            .data(nodes)
            .join("circle")
            .attr("class", "node")
            .attr("r", 10)
            .attr("fill", (d) => color(d.type))
            .on("mouseenter", (event, d) => updateDetail(d))
            .on("mouseleave", () => updateDetail(null))
            .call(
              d3
                .drag()
                .on("start", (event, d) => {
                  if (!event.active) simulation.alphaTarget(0.3).restart();
                  d.fx = d.x;
                  d.fy = d.y;
                })
                .on("drag", (event, d) => {
                  d.fx = event.x;
                  d.fy = event.y;
                })
                .on("end", (event, d) => {
                  if (!event.active) simulation.alphaTarget(0);
                  d.fx = null;
                  d.fy = null;
                })
            );

          const label = zoomLayer
            .append("g")
            .selectAll("text")
            .data(nodes)
            .join("text")
            .attr("class", "node-label")
            .text((d) => d.label)
            .attr("opacity", 0.85);

          simulation.on("tick", () => {
            link
              .attr("x1", (d) => d.source.x)
              .attr("y1", (d) => d.source.y)
              .attr("x2", (d) => d.target.x)
              .attr("y2", (d) => d.target.y);

            node.attr("cx", (d) => d.x).attr("cy", (d) => d.y);

            label
              .attr("x", (d) => d.x + 12)
              .attr("y", (d) => d.y + 4);
          });

          const resizeObserver = new ResizeObserver(() => {
            simulation.force("center", d3.forceCenter(width() / 2, height() / 2));
            simulation.alpha(0.3).restart();
          });
          resizeObserver.observe(chart);
        })
        .catch((err) => {
          status.textContent = "Failed to load graph.json";
          console.error(err);
        });
    </script>
  </body>
</html>
